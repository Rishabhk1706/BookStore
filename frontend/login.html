<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookStore Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" id="mainNav"></nav>
    </header>

    <main class="container">
        <div class="auth-card">
            <h1>Login</h1>
            <p>Login to continue shopping, manage your wishlist, and track your orders.</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" style="width: 100%;">Login</button>
            </form>

            <p style="margin-top: 1rem; text-align: center;" class="muted">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </p>
        </div>
    </main>

    <footer class="site-footer"><div class="site-footer-inner">User-friendly login with session expiry handling and toast feedback.</div></footer>
</body>
</html>
