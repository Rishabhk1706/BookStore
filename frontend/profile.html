<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BookStore Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" id="mainNav"></nav>
    </header>

    <main class="container">
        <section class="section">
            <h1>Profile</h1>
            <div id="profileContainer"></div>
        </section>
    </main>

    <footer class="site-footer"><div class="site-footer-inner">Profile gives users a simple overview of their account and role.</div></footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            checkAuth();
            const user = getCurrentUser();
            document.getElementById("profileContainer").innerHTML = `
                <div class="detail-grid">
                    <div class="detail-card"><strong>Name</strong><span>${user.name}</span></div>
                    <div class="detail-card"><strong>Role</strong><span>${user.role}</span></div>
                    <div class="detail-card"><strong>User ID</strong><span>${user.userId}</span></div>
                </div>
                <div class="hint-card">
                    <h3>How to use your account</h3>
                    <p>From here you can continue to books, cart, wishlist, or orders using the navbar above.</p>
                </div>
            `;
        });
    </script>
</body>
</html>
