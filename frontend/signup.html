<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BookStore Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" id="mainNav"></nav>
    </header>

    <main class="container">
        <div class="auth-card">
            <h1>Sign Up</h1>
            <p>Create your reader account to start browsing, saving, and ordering books.</p>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" style="width: 100%;">Sign Up</button>
            </form>

            <p style="margin-top: 1rem; text-align: center;" class="muted">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <footer class="site-footer"><div class="site-footer-inner">Your password is stored securely using BCrypt in the backend.</div></footer>
</body>
</html>
