<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - BookStore Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/order.js" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="main-nav" id="mainNav"></nav>
    </header>

    <main class="container">
        <div class="section">
            <h1>Shopping Cart</h1>
            <p>Review your selected books, update quantities, and place your order with a full pricing breakdown.</p>
            <div id="cartContainer"></div>
        </div>
    </main>

    <footer class="site-footer"><div class="site-footer-inner">Empty cart? Go back to Books and start building your order.</div></footer>

    <script>
        async function displayCart() {
            checkAuth();
            const cart = await getCart();
            const container = document.getElementById("cartContainer");
            if (!container) return;

            if (!cart || cart.items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Your cart is empty</h3>
                        <p>Add books first, then review your order here.</p>
                        <a class="button" href="books.html">Go To Books</a>
                    </div>
                `;
                return;
            }

            const summary = calculateCartSummary(cart);
            container.innerHTML = `
                <div class="admin-layout">
                    <div class="surface-card">
                        ${cart.items.map(item => `
                            <div class="cart-line">
                                <img class="cart-thumb" src="https://picsum.photos/seed/${item.bookId}/120/140" alt="${item.title}">
                                <div>
                                    <h3>${item.title}</h3>
                                    <p class="muted">${formatCurrency(item.price)} each</p>
                                    <div class="button-row" style="margin-top:0.6rem;">
                                        <input type="number" value="${item.quantity}" min="1" onchange="updateQuantity('${item.bookId}', this.value)" style="max-width: 100px;">
                                        <button class="button ghost small" onclick="removeItem('${item.bookId}')">Remove</button>
                                    </div>
                                </div>
                                <strong>${formatCurrency(item.total)}</strong>
                            </div>
                        `).join("")}
                    </div>
                    <div class="summary-card">
                        <h2>Order Summary</h2>
                        <div class="summary-row"><span>Items</span><span>${cart.items.length}</span></div>
                        <div class="summary-row"><span>Subtotal</span><span>${formatCurrency(summary.subtotal)}</span></div>
                        <div class="summary-row"><span>Tax (5%)</span><span>${formatCurrency(summary.tax)}</span></div>
                        <div class="summary-row total"><span>Total</span><span>${formatCurrency(summary.total)}</span></div>
                        <div class="form-actions">
                            <button class="button success" onclick="checkout()">Place Order</button>
                            <a class="button ghost" href="books.html">Continue Shopping</a>
                        </div>
                    </div>
                </div>
            `;
        }

        async function updateQuantity(bookId, quantity) {
            const cart = await updateCartQuantity(bookId, parseInt(quantity));
            if (cart) {
                showToast("Cart updated", "success");
                displayCart();
            }
        }

        async function removeItem(bookId) {
            const cart = await removeFromCart(bookId);
            if (cart) {
                showToast("Item removed from cart", "info");
                displayCart();
            }
        }

        async function checkout() {
            const cart = await getCart();
            if (!cart || cart.items.length === 0) {
                showToast("Cart is empty", "warning");
                return;
            }

            const summary = calculateCartSummary(cart);
            const order = await placeOrder(cart.items, summary.total);
            if (order.id) {
                saveOrderConfirmation(order);
                await clearCart();
                showToast("Order placed successfully", "success");
                window.location.href = "order-confirmation.html";
            } else {
                showToast(order.message || "Failed to place order", "error");
            }
        }

        document.addEventListener("DOMContentLoaded", displayCart);
    </script>
</body>
</html>
